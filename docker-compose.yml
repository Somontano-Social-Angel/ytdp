# MeTube + Caddy (basic auth) para Coolify — AUTOCONTENIDO.
# Caddyfile embebido (sin bind mount). Usuario y hash se leen de VARIABLES DE
# ENTORNO -> para cambiar la contraseña editas el env en Coolify, sin tocar git.
#
# Cambiar contraseña:
#   1) genera hash:  docker run --rm caddy:2-alpine caddy hash-password --plaintext 'TU_PASS'
#   2) en Coolify (Environment Variables) pon METUBE_HASH = ese hash TAL CUAL ($2a$14$...)
#      y METUBE_USER = el usuario que quieras
#   3) Redeploy
# (Por defecto, sin env: admin / cambiame)

configs:
  caddyfile:
    content: |
      :80 {
      	basic_auth {
      		{$$METUBE_USER} {$$METUBE_HASH}
      	}
      	reverse_proxy metube:8081
      }

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      # Coolify inyecta dominio y enruta Traefik -> este contenedor puerto 80
      - SERVICE_FQDN_CADDY_80
      # user/hash de la basic auth (defaults: admin / cambiame)
      - METUBE_USER=${METUBE_USER:-admin}
      - METUBE_HASH=${METUBE_HASH:-$$2a$$14$$9R/KPHxzUjUOMgMrLQ61L.EgR.jqL.QFDIS7MpxxQi5K9qgYLLeBm}
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    depends_on:
      - metube

  metube:
    image: ghcr.io/alexta69/metube:latest
    restart: unless-stopped
    environment:
      TZ: Europe/Madrid
      OUTPUT_TEMPLATE: "%(title)s.%(ext)s"
      DOWNLOAD_MODE: "concurrent"
      MAX_CONCURRENT_DOWNLOADS: "3"
    volumes:
      - ./descargas:/downloads
    expose:
      - "8081"
