# AUTOCONTENIDO — para pegar directo en Coolify (Docker Compose Empty).
# El Caddyfile va embebido abajo en configs.content, no necesita repo ni ficheros sueltos.
#
# IMPORTANTE: dentro de content los '$' del hash van DUPLICADOS ($$) porque
# Docker Compose interpola variables. Usuario: admin  Password: cambiame

configs:
  caddyfile:
    content: |
      :80 {
      	basic_auth {
      		admin $$2a$$14$$9R/KPHxzUjUOMgMrLQ61L.EgR.jqL.QFDIS7MpxxQi5K9qgYLLeBm
      	}
      	reverse_proxy metube:8081
      }

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_CADDY_80
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    depends_on:
      - metube

  metube:
    image: ghcr.io/alexta69/metube:latest
    restart: unless-stopped
    environment:
      TZ: Europe/Madrid
      OUTPUT_TEMPLATE: "%(title)s.%(ext)s"
      DOWNLOAD_MODE: "concurrent"
      MAX_CONCURRENT_DOWNLOADS: "3"
    volumes:
      - ./descargas:/downloads
    expose:
      - "8081"
